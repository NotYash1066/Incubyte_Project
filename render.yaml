services:
  - type: web
    name: incubyte-dealership-api
    env: node
    buildCommand: npm install && npm run db:migrate -w server && npm run build -w server
    startCommand: npm run start -w server
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
    plan: free
